<!DOCTYPE html>
<html>
<head>
  <title>AgronomK</title>
</head>
<body>

<h2 id="title">Вход</h2>

<div id="login">
  <input id="l_user" placeholder="Логин">
  <input id="l_pass" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<br>

<div id="register" style="display:none;">
  <input id="r_user" placeholder="Логин">
  <input id="r_pass" type="password" placeholder="Пароль">
  <button onclick="register()">Регистрация</button>
</div>

<br>

<button onclick="toggle()">Переключить</button>

<script>
let isLogin = true

function toggle() {
  isLogin = !isLogin

  document.getElementById('login').style.display = isLogin ? 'block' : 'none'
  document.getElementById('register').style.display = isLogin ? 'none' : 'block'

  document.getElementById('title').innerText = isLogin ? 'Вход' : 'Регистрация'
}

// login
async function login() {
  const username = document.getElementById('l_user').value
  const password = document.getElementById('l_pass').value

  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username, password })
  })

  alert(await res.text())
}

// register
async function register() {
  const username = document.getElementById('r_user').value
  const password = document.getElementById('r_pass').value

  const res = await fetch('/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username, password })
  })

  alert(await res.text())
}
</script>

</body>
</html>
